# =============================================
# Flower Nail Bar - Application Configuration
# =============================================

# Server
server.port=8080

# Application Name
spring.application.name=flower-nail-bar

# SQLite DataSource (no ORM, pure JDBC)
spring.datasource.url=jdbc:sqlite:flowernailbar.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Disable JPA/Hibernate auto-config (we use raw JDBC only)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.enabled=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging
logging.level.com.flowernailbar=INFO
logging.level.org.springframework.jdbc=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n
logging.file.name=logs/flowernailbar.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

# Notification Service URL (points to mock controller in same app)
notification.service.url=http://localhost:8080/notification/send
