<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Appointment – Flower Nail Bar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: header('Confirm Appointment')}"></div>

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">FLOWER NAIL BAR –
            <span th:text="${service?.location}">SAN JOSE</span></h1>
        <p class="page-subtitle">Luxury Nail Salon</p>
    </div>

    <!-- Flash error -->
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <div class="confirm-layout">
        <!-- Booking Summary Card -->
        <div class="summary-card">
            <h2 class="summary-title">Booking Summary</h2>
            <div class="summary-row">
                <span class="summary-label">Service:</span>
                <span class="summary-value" th:text="${service?.name}">GEL Manicure</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Duration:</span>
                <span class="summary-value" th:text="${service?.durationMin} + ' min'">55 min</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Price:</span>
                <span class="summary-value" th:text="'$' + ${service?.price}">$65</span>
            </div>
            <div class="summary-divider"></div>
            <div class="summary-row">
                <span class="summary-label">Date:</span>
                <span class="summary-value" th:text="${slot?.slotDate}">2026-05-09</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Time:</span>
                <span class="summary-value" th:text="${slot?.slotTime}">11:00 AM</span>
            </div>
            <div class="summary-row">
                <span class="summary-label">Location:</span>
                <span class="summary-value" th:text="${slot?.location}">San Jose</span>
            </div>
            <div class="summary-row" th:if="${technician != null}">
                <span class="summary-label">Technician:</span>
                <span class="summary-value" th:text="${technician.name}">Lily</span>
            </div>
        </div>

        <!-- Customer Info Form -->
        <div class="info-card">
            <h2 class="info-title">Your Information</h2>

            <p class="auth-switch" th:if="${currentUser != null}" style="margin: -0.5rem 0 1rem; text-align:left;">
                Booking as <strong th:text="${currentUser.email}">you@example.com</strong>
            </p>

            <form th:action="@{/book/confirm}" method="post">
                <input type="hidden" name="serviceId" th:value="${service?.id}">
                <input type="hidden" name="slotId" th:value="${slot?.id}">
                <input type="hidden" name="technicianId" th:value="${bookingRequest?.technicianId}">

                <div class="form-group">
                    <label class="form-label">Full Name *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128100;</span>
                        <input type="text" name="fullName" class="form-input"
                               placeholder="Your full name" required
                               th:value="${bookingRequest?.fullName}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#9993;</span>
                        <input type="email" name="email" class="form-input"
                               placeholder="example@gmail.com" required readonly
                               th:value="${bookingRequest?.email}">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Phone Number *</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128222;</span>
                        <input type="tel" name="phone" class="form-input"
                               placeholder="408-xxx-xxxx" required
                               th:value="${bookingRequest?.phone}">
                    </div>
                </div>

                <div class="form-actions">
                    <a th:href="@{/book/slots(serviceId=${service?.id}, location=${slot?.location})}"
                       class="btn-back">&#8592; Back</a>
                    <button type="submit" class="btn-confirm">Confirm Appointment</button>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
