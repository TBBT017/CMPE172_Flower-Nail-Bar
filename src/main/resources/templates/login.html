<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In – Flower Nail Bar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: header('Sign In')}"></div>

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">SIGN IN</h1>
        <p class="page-subtitle">Welcome back</p>
    </div>

    <div class="auth-card">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" name="next" th:value="${next}">

            <div class="form-group">
                <label class="form-label">Email or Username</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#9993;</span>
                    <input type="text" name="email" class="form-input"
                           placeholder="example@gmail.com" required autofocus
                           autocapitalize="none" autocorrect="off" spellcheck="false">
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" name="password" class="form-input"
                           placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="btn-confirm">Sign In</button>
        </form>

        <p class="auth-switch">
            Don't have an account?
            <a th:href="@{/signup(next=${next})}">Create one</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
