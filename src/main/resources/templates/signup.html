<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account – Flower Nail Bar</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="~{fragments/layout :: header('Sign Up')}"></div>

<main class="page-main">
    <div class="page-header">
        <h1 class="page-title">CREATE ACCOUNT</h1>
        <p class="page-subtitle">Join Flower Nail Bar</p>
    </div>

    <div class="auth-card">
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <form th:action="@{/signup}" method="post">
            <input type="hidden" name="next" th:value="${next}">

            <div class="form-group">
                <label class="form-label">Full Name</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128100;</span>
                    <input type="text" name="fullName" class="form-input"
                           placeholder="Your full name" required autofocus>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Email Address</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#9993;</span>
                    <input type="email" name="email" class="form-input"
                           placeholder="example@gmail.com" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Phone Number</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128222;</span>
                    <input type="tel" name="phone" class="form-input"
                           placeholder="408-xxx-xxxx" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Password (min 6 chars)</label>
                <div class="input-wrapper">
                    <span class="input-icon">&#128274;</span>
                    <input type="password" name="password" class="form-input"
                           placeholder="••••••••" required minlength="6">
                </div>
            </div>

            <button type="submit" class="btn-confirm">Create Account</button>
        </form>

        <p class="auth-switch">
            Already have an account?
            <a th:href="@{/login(next=${next})}">Sign in</a>
        </p>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
